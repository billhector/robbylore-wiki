# yaml-language-server: $schema=quartz/plugins/quartz-plugins.schema.json
# robbylore.org — Robby Hoffman fan wiki
configuration:
  pageTitle: Robby Lore
  pageTitleSuffix: ""
  enableSPA: true
  enablePopovers: true
  analytics: null
  locale: en-US
  baseUrl: robbylore.org
  ignorePatterns:
    - private
    - templates
    - .obsidian
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: Cutive
      body: Source Sans Pro
      code: IBM Plex Mono
    # Palette is intentionally 4 colors only:
    #   C1 #213448 navy   C2 #547792 steel   C3 #94B4C1 soft   C4 #EAE0CF cream
    # Light mode anchors on C4; dark mode flips on C1.
    colors:
      lightMode:
        light: "#EAE0CF"            # C4 — page bg
        lightgray: "#94B4C1"        # C3 — subtle borders / dividers
        gray: "#547792"              # C2 — muted text
        darkgray: "#213448"          # C1 — body text
        dark: "#213448"              # C1 — headings / strong
        secondary: "#547792"         # C2 — accent / links (≈4.5:1 on cream)
        tertiary: "#213448"          # C1 — link hover (darken)
        highlight: rgba(0, 0, 0, 0)  # disable wikilink pill background
        textHighlight: "rgba(84, 119, 146, 0.25)"  # ==marked== subtle steel tint
      darkMode:
        light: "#213448"             # C1 — page bg
        lightgray: "#547792"         # C2 — subtle borders / dividers
        gray: "#94B4C1"               # C3 — muted text
        darkgray: "#EAE0CF"           # C4 — body text
        dark: "#EAE0CF"               # C4 — headings / strong
        secondary: "#94B4C1"          # C3 — accent / links (≈9:1 on navy)
        tertiary: "#EAE0CF"           # C4 — link hover (lighten)
        highlight: rgba(0, 0, 0, 0)
        textHighlight: "rgba(148, 180, 193, 0.25)"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      comments: true
      highlight: true
      wikilinks: true
      callouts: true
      mermaid: true
      parseTags: true
      parseArrows: true
      parseBlockReferences: true
      enableInHtmlEmbed: false
      enableYouTubeEmbed: true
      enableVideoEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: true
    options:
      renderEngine: katex
    order: 80
  - source: github:quartz-community/hard-line-breaks
    enabled: true
    order: 90
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/explicit-publish
    enabled: true
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: true
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      links:
        Email: mailto:robbyhoffmanlore@gmail.com
        Source: https://github.com/billhector/robbylore-wiki
  - source: github:quartz-community/recent-notes
    enabled: false
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includeAll: false
      includedProperties:
        - description
        - tags
        - aliases
      excludedProperties: []
      hidePropertiesView: false
      delimiters: "---"
      language: yaml
    order: 5
    layout:
      position: beforeBody
      priority: 15
      display: all
  - source:
      name: quartz-themes
      repo: github:saberzero1/quartz-themes
      subdir: plugin
    # DISABLED 2026-05-29: plugin's @layer obsidian-theme overrides Quartz's
    # quartz-base CSS variables (--titleFont, --light, --secondary, etc),
    # clobbering everything set in configuration.theme above. Re-enable only
    # if we also accept the plugin's full Obsidian palette + typography.
    enabled: false
    options:
      theme: default
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
